<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Esteban Ardila Valencia</title>
  <link rel="stylesheet" href="assets/style.css" />
</head>
<body>
  <header id="header"></header>

  <main>
    <section id="about"></section>
    <section id="experience"></section>
    <section id="projects"></section>
    <section id="skills"></section>
    <section id="education"></section>
  </main>

  <footer id="footer"></footer>

  <script>
    fetch('data/portfolio.json')
      .then(res => res.json())
      .then(data => render(data))
      .catch(err => console.error('Failed to load portfolio data:', err));

    function render(data) {
      renderHeader(data.identity);
      renderAbout(data.about);
      renderExperience(data.experience);
      renderProjects(data.projects);
      renderSkills(data.skills);
      renderEducation(data.education, data.certifications);
      renderFooter(data.identity);
    }

    function renderHeader(identity) {
      document.getElementById('header').innerHTML = `
        <div class="container">
          <h1>${identity.name}</h1>
          <p class="title">${identity.title}</p>
          <p class="location">${identity.location}</p>
          <nav class="links">
            <a href="mailto:${identity.email}">${identity.email}</a>
            <a href="${identity.linkedin}" target="_blank" rel="noopener">LinkedIn</a>
          </nav>
        </div>
      `;
    }

    function renderAbout(about) {
      document.getElementById('about').innerHTML = `
        <div class="container">
          <h2>About</h2>
          <p>${about}</p>
        </div>
      `;
    }

    function renderExperience(experience) {
      const items = experience.map(job => `
        <div class="card">
          <div class="card-header">
            <h3>${job.role}</h3>
            <span class="period">${job.period}</span>
          </div>
          <p class="company">${job.company}</p>
          <p>${job.summary}</p>
          <ul>
            ${job.highlights.map(h => `<li>${h}</li>`).join('')}
          </ul>
        </div>
      `).join('');

      document.getElementById('experience').innerHTML = `
        <div class="container">
          <h2>Experience</h2>
          ${items}
        </div>
      `;
    }

    function renderProjects(projects) {
      const cards = projects.map(project => `
        <div class="card">
          <h3>${project.name}</h3>
          <p>${project.description}</p>
          <div class="tags">
            ${project.tags.map(tag => `<span class="tag">${tag}</span>`).join('')}
          </div>
          <a href="${project.url}" target="_blank" rel="noopener" class="btn">View Project</a>
        </div>
      `).join('');

      document.getElementById('projects').innerHTML = `
        <div class="container">
          <h2>Projects</h2>
          <div class="grid">
            ${cards}
          </div>
        </div>
      `;
    }

    function renderSkills(skills) {
      const groups = Object.entries(skills).map(([group, items]) => `
        <div class="skill-group">
          <h3>${group}</h3>
          <ul>
            ${items.map(item => `<li>${item}</li>`).join('')}
          </ul>
        </div>
      `).join('');

      document.getElementById('skills').innerHTML = `
        <div class="container">
          <h2>Skills</h2>
          <div class="skills-grid">
            ${groups}
          </div>
        </div>
      `;
    }

    function renderEducation(education, certifications) {
      const eduItems = education.map(edu => `
        <div class="card">
          <h3>${edu.degree}</h3>
          <p class="company">${edu.institution}</p>
          <span class="period">${edu.year}</span>
        </div>
      `).join('');

      const certItems = certifications.map(cert => `<li>${cert}</li>`).join('');

      document.getElementById('education').innerHTML = `
        <div class="container">
          <h2>Education</h2>
          ${eduItems}
          <h2>Certifications</h2>
          <ul>${certItems}</ul>
        </div>
      `;
    }

    function renderFooter(identity) {
      const year = new Date().getFullYear();
      document.getElementById('footer').innerHTML = `
        <div class="container">
          <p>&copy; ${year} ${identity.name}</p>
        </div>
      `;
    }
  </script>
</body>
</html>
